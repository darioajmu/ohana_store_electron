default: &default
  adapter: sqlite3
  pool: 5
  timeout: 5000

development:
  <<: *default
  database: <%= ENV.fetch("OHANA_DEVELOPMENT_DB_PATH") { Rails.root.join("storage", "development.sqlite3") } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("OHANA_TEST_DB_PATH") { Rails.root.join("storage", "test.sqlite3") } %>

production:
  <<: *default
  database: <%= ENV.fetch("OHANA_PRODUCTION_DB_PATH") { Rails.root.join("storage", "production.sqlite3") } %>

desktop:
  <<: *default
  database: <%= ENV.fetch("OHANA_DESKTOP_DB_PATH") { Rails.root.join("storage", "desktop.sqlite3") } %>
